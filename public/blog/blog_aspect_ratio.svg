<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0d12" />
      <stop offset="100%" stop-color="#14141d" />
    </linearGradient>
    <linearGradient id="cropGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eab308" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Outer canvas boundary -->
  <rect x="220" y="50" width="360" height="300" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.1)" stroke-width="1.5" stroke-dasharray="8 4" />
  
  <!-- Aspect ratio overlays -->
  <!-- 16:9 vertical crop box -->
  <rect x="340" y="60" width="120" height="280" rx="20" fill="none" stroke="url(#cropGrad)" stroke-width="3" />
  
  <!-- 19.5:9 crop box -->
  <rect x="360" y="60" width="80" height="280" rx="20" fill="none" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="10 5" />
  
  <!-- Horizontal wide monitor outline -->
  <rect x="235" y="110" width="330" height="180" rx="10" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.8" />
  
  <!-- Measurements & labels -->
  <g font-family="sans-serif" font-size="10" font-weight="600" opacity="0.8">
    <text x="400" y="195" text-anchor="middle" fill="#eab308" letter-spacing="1">16:9 STANDARD</text>
    <text x="400" y="215" text-anchor="middle" fill="#f43f5e" letter-spacing="1">19.5:9 ULTRA-TALL</text>
    <text x="400" y="145" text-anchor="middle" fill="#3b82f6" letter-spacing="1">PC WIDE (16:10)</text>
  </g>
  
  <text x="50%" y="375" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="11" letter-spacing="3">SPECIFICATION &amp; RESOLUTION GUIDE</text>
</svg>
