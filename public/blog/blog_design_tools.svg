<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a0a" />
      <stop offset="100%" stop-color="#0e1b1b" />
    </linearGradient>
    <linearGradient id="vectorGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Grid overlay -->
  <g stroke="rgba(20,184,166,0.06)" stroke-width="1">
    <line x1="100" y1="0" x2="100" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="400" y1="0" x2="400" y2="400" />
    <line x1="500" y1="0" x2="500" y2="400" />
    <line x1="600" y1="0" x2="600" y2="400" />
    <line x1="700" y1="0" x2="700" y2="400" />
    
    <line x1="0" y1="100" x2="800" y2="100" />
    <line x1="0" y1="200" x2="800" y2="200" />
    <line x1="0" y1="300" x2="800" y2="300" />
  </g>
  
  <!-- Vector Bezier Curve -->
  <path d="M150,250 C280,50 520,350 650,150" fill="none" stroke="url(#vectorGrad)" stroke-width="5" />
  
  <!-- Anchor points & handles -->
  <g stroke="#ffffff" stroke-width="1.5">
    <!-- Anchor 1 -->
    <rect x="145" y="245" width="10" height="10" fill="#14b8a6" />
    
    <!-- Control points for center curve -->
    <line x1="320" y1="110" x2="280" y2="50" />
    <circle cx="280" cy="50" r="4" fill="#06b6d4" />
    
    <line x1="480" y1="290" x2="520" y2="350" />
    <circle cx="520" cy="350" r="4" fill="#06b6d4" />
    
    <!-- Anchor 2 -->
    <rect x="645" y="145" width="10" height="10" fill="#14b8a6" />
  </g>

  <!-- Stylized Pen Tool Nib -->
  <g transform="translate(262, 32) rotate(-45)">
    <path d="M0,0 L20,-10 L30,10 L10,20 Z" fill="#334155" stroke="#ffffff" stroke-width="1.5" />
    <path d="M20,-10 L40,-30 L30,-40 L10,-20 Z" fill="#64748b" />
    <!-- Nib tip -->
    <polygon points="0,0 5,-25 -5,-25" fill="#e2e8f0" stroke="#ffffff" stroke-width="1" />
    <line x1="0" y1="-5" x2="0" y2="-20" stroke="#1e293b" stroke-width="1" />
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(20,184,166,0.4)" font-family="sans-serif" font-size="11" letter-spacing="4">VECTOR DRAWING UTILITY LAB</text>
</svg>
