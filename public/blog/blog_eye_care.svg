      <stop offset="0%" stop-color="#d98c72" />
      <stop offset="100%" stop-color="#b86b51" />
    </linearGradient>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.06" />
