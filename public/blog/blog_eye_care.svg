      <stop offset="0%" stop-color="#faf9f6" />
      <stop offset="100%" stop-color="#f2efe9" />
    </linearGradient>
    <linearGradient id="oliveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#8a9a86" />
      <stop offset="100%" stop-color="#606f5c" />
    </linearGradient>
