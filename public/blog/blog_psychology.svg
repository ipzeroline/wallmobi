<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070c14" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#050811" />
    </linearGradient>
    <linearGradient id="psycheGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="35%" stop-color="#a855f7" />
      <stop offset="70%" stop-color="#f43f5e" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <radialGradient id="blueGlow" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="pinkGlow" cx="70%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="35" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="250" cy="180" r="220" fill="url(#blueGlow)" filter="url(#blur)" />
  <circle cx="550" cy="220" r="220" fill="url(#pinkGlow)" filter="url(#blur)" />
  
  <!-- Calming waves of color -->
  <path d="M-100,200 Q200,80 400,220 T900,180" fill="none" stroke="url(#psycheGrad)" stroke-width="5" opacity="0.85" />
  <path d="M-100,160 Q150,280 450,120 T900,240" fill="none" stroke="url(#psycheGrad)" stroke-width="2.5" opacity="0.45" />
  
  <!-- Color theory wheel/nodes -->
  <g opacity="0.8">
    <circle cx="200" cy="220" r="28" fill="#0ea5e9" fill-opacity="0.2" stroke="#38bdf8" stroke-width="2" />
    <circle cx="200" cy="220" r="4" fill="#38bdf8" />
    <text x="200" y="270" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="1">CALM</text>

    <circle cx="330" cy="150" r="28" fill="#8b5cf6" fill-opacity="0.2" stroke="#a855f7" stroke-width="2" />
    <circle cx="330" cy="150" r="4" fill="#a855f7" />
    <text x="330" y="200" text-anchor="middle" fill="#a855f7" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="1">CREATIVE</text>

    <circle cx="470" cy="150" r="28" fill="#ec4899" fill-opacity="0.2" stroke="#f43f5e" stroke-width="2" />
    <circle cx="470" cy="150" r="4" fill="#f43f5e" />
    <text x="470" y="200" text-anchor="middle" fill="#f43f5e" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="1">ENERGY</text>

    <circle cx="600" cy="220" r="28" fill="#eab308" fill-opacity="0.2" stroke="#facc15" stroke-width="2" />
    <circle cx="600" cy="220" r="4" fill="#facc15" />
    <text x="600" y="270" text-anchor="middle" fill="#facc15" font-family="sans-serif" font-size="10" font-weight="600" letter-spacing="1">FOCUS</text>
  </g>
  
  <text x="50%" y="350" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="12" letter-spacing="4">COLOR PSYCHOLOGY LAB</text>
</svg>
