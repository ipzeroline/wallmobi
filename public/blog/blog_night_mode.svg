<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#02020a" />
      <stop offset="60%" stop-color="#07071f" />
      <stop offset="100%" stop-color="#0a0a33" />
    </linearGradient>
    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Starry Sky Dots -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="150" cy="80" r="1" />
    <circle cx="280" cy="120" r="1.5" />
    <circle cx="390" cy="70" r="1" />
    <circle cx="580" cy="110" r="1.5" />
    <circle cx="680" cy="90" r="1" />
    <circle cx="200" cy="220" r="1.5" />
    <circle cx="620" cy="200" r="1" />
  </g>
  
  <!-- Glowing Moon -->
  <circle cx="400" cy="190" r="120" fill="url(#moonGlow)" filter="url(#blur)" />
  
  <!-- Crescent Moon shape -->
  <path d="M430,120 A70,70 0 1,0 430,260 A62,62 0 1,1 430,120 Z" fill="url(#moonGrad)" />
  
  <!-- Calm Sleep Waves -->
  <path d="M100,280 Q250,230 400,280 T700,280" fill="none" stroke="#fef08a" stroke-width="2.5" opacity="0.6" />
  <path d="M100,300 Q250,260 400,300 T700,300" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.4" />
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(254,240,138,0.4)" font-family="sans-serif" font-size="11" letter-spacing="4">NIGHT MODE SLEEP COGNITION</text>
</svg>
