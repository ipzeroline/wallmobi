<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0514" />
      <stop offset="50%" stop-color="#14072b" />
      <stop offset="100%" stop-color="#06020d" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>
    <radialGradient id="mysticGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#eab308" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="400" cy="200" r="220" fill="url(#mysticGlow)" filter="url(#blur)" />
  
  <!-- Astrological Chart Lines -->
  <g stroke="rgba(253,224,71,0.2)" stroke-width="1.5" fill="none">
    <circle cx="400" cy="180" r="100" />
    <circle cx="400" cy="180" r="130" stroke-dasharray="6 6" />
    <line x1="400" y1="50" x2="400" y2="310" />
    <line x1="270" y1="180" x2="530" y2="180" />
    <line x1="310" y1="90" x2="490" y2="270" />
    <line x1="310" y1="270" x2="490" y2="90" />
  </g>
  
  <!-- Glowing birth day color nodes -->
  <g stroke="#ffffff" stroke-width="2">
    <!-- Monday (Yellow) -->
    <circle cx="400" cy="80" r="14" fill="#eab308" />
    <!-- Tuesday (Pink) -->
    <circle cx="490" cy="118" r="12" fill="#ec4899" />
    <!-- Wednesday (Green) -->
    <circle cx="520" cy="208" r="12" fill="#22c55e" />
    <!-- Saturday (Purple) -->
    <circle cx="310" cy="242" r="12" fill="#a855f7" />
    <!-- Sunday (Red) -->
    <circle cx="400" cy="280" r="14" fill="#ef4444" />
  </g>
  
  <text x="50%" y="350" text-anchor="middle" fill="url(#goldGrad)" font-family="sans-serif" font-size="13" font-weight="bold" letter-spacing="4">LUCKY COLOR ASTROLOGY</text>
  <text x="50%" y="370" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="10" letter-spacing="1">MUTELU PERSONALIZATION STYLE</text>
</svg>
