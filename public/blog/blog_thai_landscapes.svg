<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdba74" />
      <stop offset="60%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#c2410c" />
    </linearGradient>
    <linearGradient id="seaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#075985" stop-opacity="0.9" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.3" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Sun -->
  <circle cx="400" cy="180" r="75" fill="#fef08a" opacity="0.9" filter="url(#shadow)" />
  
  <!-- Chiang Mai Mountain Silhouette (Left) -->
  <path d="M50,320 L180,210 L300,280 L420,180 L520,290 L600,320 Z" fill="#431407" opacity="0.8" />
  
  <!-- Southern Sea Waves & Island Silhouette (Right) -->
  <path d="M500,320 C530,280 570,250 620,270 C670,290 700,220 750,280 L750,330 L500,330 Z" fill="#1e293b" opacity="0.9" />
  
  <!-- Sea overlap -->
  <rect x="100" y="310" width="600" height="30" fill="url(#seaGrad)" rx="6" />
  
  <text x="50%" y="375" text-anchor="middle" fill="#fef08a" font-family="sans-serif" font-size="11" letter-spacing="4">THAILAND SCENIC LANDSCAPES</text>
</svg>
