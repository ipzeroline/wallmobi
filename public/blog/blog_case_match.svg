<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14141d" />
      <stop offset="50%" stop-color="#1b1b2a" />
      <stop offset="100%" stop-color="#12121a" />
    </linearGradient>
    <linearGradient id="case1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
    <linearGradient id="case2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.9" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="15" stdDeviation="12" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Left Phone Mockup: Rose Gold Case -->
  <g transform="translate(240, 60)" filter="url(#shadow)">
    <!-- Case border -->
    <rect x="0" y="0" width="130" height="250" rx="28" fill="url(#case1Grad)" />
    <!-- Screen glass -->
    <rect x="8" y="8" width="114" height="234" rx="20" fill="#1e1e24" />
    <!-- Wallpaper artwork (rose pastel shapes) -->
    <circle cx="57" cy="117" r="45" fill="#fda4af" opacity="0.3" />
    <path d="M15,180 Q60,130 90,200 T110,240" fill="none" stroke="#fda4af" stroke-width="3" opacity="0.8" />
    <rect x="8" y="8" width="114" height="234" rx="20" fill="url(#screenGrad)" />
  </g>

  <!-- Right Phone Mockup: Emerald Case -->
  <g transform="translate(430, 90)" filter="url(#shadow)">
    <!-- Case border -->
    <rect x="0" y="0" width="130" height="250" rx="28" fill="url(#case2Grad)" />
    <!-- Screen glass -->
    <rect x="8" y="8" width="114" height="234" rx="20" fill="#1e1e24" />
    <!-- Wallpaper artwork (emerald leaves/waves) -->
    <path d="M15,80 Q57,140 100,80 T110,220" fill="none" stroke="#34d399" stroke-width="4" opacity="0.75" />
    <circle cx="57" cy="180" r="30" fill="#a7f3d0" opacity="0.2" />
    <rect x="8" y="8" width="114" height="234" rx="20" fill="url(#screenGrad)" />
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="11" letter-spacing="3">STYLE COORDINATION &amp; AESTHETICS</text>
</svg>
