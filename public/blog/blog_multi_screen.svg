<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f111a" />
      <stop offset="100%" stop-color="#05060b" />
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- PC Monitor mockup -->
  <g transform="translate(160, 60)" filter="url(#shadow)">
    <!-- Monitor Outer bezel -->
    <rect width="360" height="210" rx="12" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <!-- Screen -->
    <rect x="8" y="8" width="344" height="194" rx="6" fill="#0b0f17" />
    <!-- Wallpaper Art -->
    <path d="M20,160 Q180,80 340,160" fill="none" stroke="url(#screenGrad)" stroke-width="6" opacity="0.95" />
    <path d="M20,120 Q180,200 340,120" fill="none" stroke="url(#screenGrad)" stroke-width="2.5" opacity="0.45" />
    <circle cx="180" cy="110" r="35" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.3" />
    
    <!-- Stand -->
    <path d="M160,210 L200,210 L210,250 L150,250 Z" fill="#1e293b" />
    <!-- Base -->
    <rect x="130" y="250" width="100" height="8" rx="4" fill="#334155" />
  </g>
  
  <!-- Smartphone mockup -->
  <g transform="translate(530, 90)" filter="url(#shadow)">
    <!-- Case -->
    <rect width="110" height="210" rx="24" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <!-- Screen -->
    <rect x="6" y="6" width="98" height="198" rx="18" fill="#0b0f17" />
    <!-- Wallpaper Art (matching PC monitor) -->
    <path d="M10,130 Q55,70 100,130" fill="none" stroke="url(#screenGrad)" stroke-width="5" opacity="0.95" />
    <circle cx="55" cy="90" r="20" fill="none" stroke="#8b5cf6" stroke-width="1.5" opacity="0.3" />
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="11" letter-spacing="4">WORKSPACE VISUAL HARMONY</text>
</svg>
