<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090514" />
      <stop offset="50%" stop-color="#140b2a" />
      <stop offset="100%" stop-color="#04020a" />
    </linearGradient>
    <linearGradient id="streamGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- UI layers stack -->
  <!-- Layer 3 (Top: Dynamic Widgets) -->
  <g transform="translate(380, 50)" opacity="0.9">
    <polygon points="120,40 280,110 160,180 0,110" fill="rgba(6, 182, 212, 0.15)" stroke="#06b6d4" stroke-width="2" />
    <text x="140" y="115" text-anchor="middle" fill="#06b6d4" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="2">DYNAMIC WIDGETS</text>
  </g>
  
  <!-- Connecting lines -->
  <line x1="320" y1="180" x2="380" y2="150" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4" />
  
  <!-- Layer 2 (Middle: OS UI Shell) -->
  <g transform="translate(240, 110)" opacity="0.75">
    <polygon points="120,40 280,110 160,180 0,110" fill="rgba(168, 85, 247, 0.15)" stroke="#a855f7" stroke-width="2" />
    <text x="140" y="115" text-anchor="middle" fill="#a855f7" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="2">INTERFACE SHELL</text>
  </g>

  <!-- Connecting lines -->
  <line x1="180" y1="240" x2="240" y2="210" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Layer 1 (Bottom: Wallpaper Engine) -->
  <g transform="translate(100, 170)" opacity="0.6">
    <polygon points="120,40 280,110 160,180 0,110" fill="rgba(59, 130, 246, 0.15)" stroke="#3b82f6" stroke-width="2" />
    <text x="140" y="115" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="10" font-weight="bold" letter-spacing="2">WALLPAPER ENGINE</text>
  </g>
  
  <!-- Flow stream vector line -->
  <path d="M50,320 C180,360 400,280 520,340 C640,400 700,250 780,290" fill="none" stroke="url(#streamGrad)" stroke-width="4" stroke-linecap="round" />

  <text x="50%" y="375" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="sans-serif" font-size="11" letter-spacing="3">DYNAMIC INTERFACE SYSTEM ARCHITECTURE</text>
</svg>
