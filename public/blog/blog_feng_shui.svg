<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0505" />
      <stop offset="50%" stop-color="#140a0a" />
      <stop offset="100%" stop-color="#050202" />
    </linearGradient>
    <linearGradient id="fireGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <radialGradient id="fengGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <circle cx="400" cy="180" r="180" fill="url(#fengGlow)" filter="url(#blur)" />
  
  <!-- Minimalist Yin-Yang / Zen circle -->
  <g stroke="url(#fireGrad)" stroke-width="4.5" fill="none" stroke-linecap="round">
    <path d="M340,180 A60,60 0 1,0 460,180" />
    <path d="M460,180 A60,60 0 1,0 340,180" stroke-dasharray="10 5" opacity="0.6" />
    
    <!-- Floating circular elements of Feng Shui -->
    <circle cx="400" cy="180" r="2" fill="#ef4444" />
    <circle cx="400" cy="180" r="100" stroke-width="1.5" stroke-dasharray="6 6" opacity="0.3" />
  </g>
  
  <text x="50%" y="340" text-anchor="middle" fill="#ef4444" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="4">MINIMAL FENG SHUI ALIGNMENT</text>
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="9" letter-spacing="1">BALANCE &amp; ENERGY FLOW FOR SCREENS</text>
</svg>
