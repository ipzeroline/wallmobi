<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a10" />
      <stop offset="100%" stop-color="#141624" />
    </linearGradient>
    <linearGradient id="dockGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Phone Screen Outline in Center -->
  <g transform="translate(320, 40)" filter="url(#shadow)">
    <rect width="160" height="320" rx="28" fill="#1e293b" stroke="rgba(255,255,255,0.08)" stroke-width="2" />
    <rect x="8" y="8" width="144" height="304" rx="20" fill="#0b0f17" />
    
    <!-- Dock capsule container (glowing glassmorphism) -->
    <rect x="18" y="245" width="124" height="42" rx="14" fill="rgba(255, 255, 255, 0.05)" stroke="url(#dockGrad)" stroke-width="1.5" />
    
    <!-- Dock icons representation -->
    <circle cx="38" cy="266" r="10" fill="#38bdf8" />
    <circle cx="62" cy="266" r="10" fill="#818cf8" />
    <circle cx="86" cy="266" r="10" fill="#f43f5e" />
    <circle cx="110" cy="266" r="10" fill="#10b981" />
    
    <!-- Mock wallpaper background elements matching dock -->
    <path d="M8,180 Q80,120 152,180" fill="none" stroke="rgba(56,189,248,0.2)" stroke-width="3" />
    <circle cx="80" cy="130" r="18" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
  </g>
  
  <text x="50%" y="380" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="10" letter-spacing="4">SYSTEM DOCK LAYOUT ARCHITECTURE</text>
</svg>
