<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020205" />
      <stop offset="50%" stop-color="#070919" />
      <stop offset="100%" stop-color="#010103" />
    </linearGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
    <filter id="glassShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="400" cy="200" r="280" fill="url(#purpleGlow)" filter="url(#blur)" />
  
  <!-- Perspective Cyber Grid -->
  <g stroke="rgba(168,85,247,0.15)" stroke-width="1">
    <!-- Horizontal lines -->
    <line x1="0" y1="280" x2="800" y2="280" />
    <line x1="0" y1="310" x2="800" y2="310" />
    <line x1="0" y1="350" x2="800" y2="350" />
    <!-- Perspective rays -->
    <line x1="400" y1="200" x2="-200" y2="400" />
    <line x1="400" y1="200" x2="100" y2="400" />
    <line x1="400" y1="200" x2="400" y2="400" />
    <line x1="400" y1="200" x2="700" y2="400" />
    <line x1="400" y1="200" x2="1000" y2="400" />
  </g>
  
  <!-- Glowing wavy curve -->
  <path d="M-50,150 Q200,50 400,200 T850,120" fill="none" stroke="url(#neonGrad)" stroke-width="4.5" opacity="0.85" />
  <path d="M-50,180 Q250,220 500,100 T850,220" fill="none" stroke="url(#neonGrad)" stroke-width="2" opacity="0.45" stroke-dasharray="10 5" />
  
  <!-- Floating Glassmorphism Card in Center -->
  <g transform="translate(280, 80)" filter="url(#glassShadow)">
    <rect width="240" height="140" rx="16" fill="rgba(255, 255, 255, 0.05)" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" />
    <!-- Card Content -->
    <circle cx="40" cy="40" r="14" fill="#a855f7" fill-opacity="0.3" stroke="#a855f7" stroke-width="1.5" />
    <path d="M36,40 L44,40 M40,36 L40,44" fill="none" stroke="#ffffff" stroke-width="2" />
    <rect x="70" y="30" width="100" height="8" rx="4" fill="rgba(255, 255, 255, 0.4)" />
    <rect x="70" y="44" width="60" height="6" rx="3" fill="rgba(255, 255, 255, 0.2)" />
    
    <rect x="25" y="80" width="190" height="1" fill="rgba(255, 255, 255, 0.1)" />
    
    <!-- Status tags -->
    <rect x="25" y="95" width="85" height="20" rx="10" fill="rgba(236,72,153,0.15)" stroke="rgba(236,72,153,0.3)" stroke-width="1" />
    <text x="67.5" y="109" text-anchor="middle" fill="#ec4899" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="1">TREND 2026</text>

    <rect x="120" y="95" width="95" height="20" rx="10" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1" />
    <text x="167.5" y="109" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="9" font-weight="bold" letter-spacing="1">PERSONALIZATION</text>
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="11" letter-spacing="4">MOBILE DESIGN TRENDSETTER</text>
</svg>
