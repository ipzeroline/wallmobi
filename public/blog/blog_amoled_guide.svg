<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="batteryGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#22c55e" />
      <stop offset="100%" stop-color="#4ade80" />
    </linearGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="25" />
    </filter>
  </defs>
  <!-- Pure Black Background (#000000) representing OLED pixel shutdown -->
  <rect width="800" height="400" fill="#000000" />
  
  <!-- Subtle green battery glow -->
  <circle cx="400" cy="200" r="180" fill="url(#greenGlow)" filter="url(#blur)" />
  
  <!-- Grid of OLED sub-pixels (Red, Green, Blue) fading out to pure black -->
  <g opacity="0.35">
    <circle cx="100" cy="80" r="3" fill="#ef4444" />
    <circle cx="108" cy="80" r="3" fill="#22c55e" />
    <circle cx="116" cy="80" r="3" fill="#3b82f6" />
    
    <circle cx="150" cy="120" r="3" fill="#ef4444" />
    <circle cx="158" cy="120" r="3" fill="#22c55e" />
    <circle cx="166" cy="120" r="3" fill="#3b82f6" />
    
    <circle cx="90" cy="180" r="3" fill="#ef4444" />
    <circle cx="98" cy="180" r="3" fill="#22c55e" />
    <circle cx="106" cy="180" r="3" fill="#3b82f6" />

    <circle cx="680" cy="100" r="3" fill="#ef4444" />
    <circle cx="688" cy="100" r="3" fill="#22c55e" />
    <circle cx="696" cy="100" r="3" fill="#3b82f6" />

    <circle cx="620" cy="240" r="3" fill="#ef4444" />
    <circle cx="628" cy="240" r="3" fill="#22c55e" />
    <circle cx="636" cy="240" r="3" fill="#3b82f6" />
  </g>
  
  <!-- Glowing Battery Outline -->
  <rect x="330" y="120" width="140" height="160" rx="20" fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" />
  <!-- Battery Cap -->
  <path d="M375,120 L375,105 C375,102 377,100 380,100 L420,100 C423,100 425,102 425,105 L425,120" fill="none" stroke="#22c55e" stroke-width="6" />
  
  <!-- Battery Power Level Fill -->
  <rect x="345" y="150" width="110" height="110" rx="10" fill="url(#batteryGrad)" />
  
  <!-- Energy Bolt Neon Symbol -->
  <path d="M405,170 L380,210 L400,210 L395,240 L420,200 L400,200 Z" fill="#ffffff" />

  <text x="50%" y="340" text-anchor="middle" fill="rgba(34,197,94,0.6)" font-family="sans-serif" font-size="12" font-weight="bold" letter-spacing="4">OLED PIXEL SHUTDOWN ACTIVE</text>
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.3)" font-family="sans-serif" font-size="10" letter-spacing="1">SAVE UP TO 20% POWER</text>
</svg>
