<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050806" />
      <stop offset="100%" stop-color="#0f1712" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <radialGradient id="greenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#10b981" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" filterUnits="userSpaceOnUse" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="400" cy="200" r="220" fill="url(#greenGlow)" filter="url(#blur)" />
  
  <!-- Calming mountain contours -->
  <path d="M100,320 Q250,220 400,280 T700,240 L700,350 L100,350 Z" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.15)" stroke-width="2" />
  
  <!-- Floating leaf silhouettes -->
  <g transform="translate(350, 100)" fill="url(#leafGrad)" opacity="0.85">
    <path d="M50,0 Q10,40 50,100 Q90,40 50,0 Z" />
    <path d="M50,50 L50,100" stroke="#047857" stroke-width="2" />
  </g>
  <g transform="translate(260, 130) rotate(-30) scale(0.7)" fill="url(#leafGrad)" opacity="0.55">
    <path d="M50,0 Q10,40 50,100 Q90,40 50,0 Z" />
  </g>
  <g transform="translate(460, 140) rotate(25) scale(0.65)" fill="url(#leafGrad)" opacity="0.65">
    <path d="M50,0 Q10,40 50,100 Q90,40 50,0 Z" />
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(16,185,129,0.4)" font-family="sans-serif" font-size="11" letter-spacing="4">BIOPHILIC DIGITAL ENGAGEMENT</text>
</svg>
