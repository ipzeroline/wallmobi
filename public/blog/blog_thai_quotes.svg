<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#03050a" />
    </linearGradient>
    <linearGradient id="quoteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000" flood-opacity="0.5" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Large abstract quotation marks -->
  <path d="M120,80 L120,160 L80,160 C80,120 100,100 120,80 Z M180,80 L180,160 L140,160 C140,120 160,100 180,80 Z" fill="url(#quoteGrad)" opacity="0.15" />
  
  <!-- Floating typographic card mockup -->
  <g transform="translate(260, 90)" filter="url(#shadow)">
    <rect width="280" height="180" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
    
    <!-- Typographic lines representation -->
    <rect x="40" y="45" width="200" height="12" rx="6" fill="url(#quoteGrad)" opacity="0.8" />
    <rect x="60" y="70" width="160" height="10" rx="5" fill="rgba(255,255,255,0.4)" />
    <rect x="80" y="95" width="120" height="8" rx="4" fill="rgba(255,255,255,0.2)" />
    
    <circle cx="140" cy="140" r="15" fill="none" stroke="url(#quoteGrad)" stroke-width="2" />
    <path d="M136,140 L144,140 M140,136 L140,144" stroke="#ffffff" stroke-width="2" />
  </g>
  
  <text x="50%" y="350" text-anchor="middle" fill="url(#quoteGrad)" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="4">CREATIVE THAI TYPOGRAPHY DESIGN</text>
</svg>
