<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="50%" stop-color="#14141a" />
      <stop offset="100%" stop-color="#060608" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.7" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Stylized Lai Thai Kranok curve shapes -->
  <g transform="translate(320, 80)" filter="url(#shadow)" stroke="url(#goldGrad)" stroke-width="4.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main flame curve -->
    <path d="M40,220 C20,180 20,100 60,60 C80,80 90,120 70,160" />
    <path d="M70,160 C90,140 120,110 110,80 C100,110 90,130 70,160" />
    
    <!-- Secondary overlapping curve -->
    <path d="M50,180 C80,210 130,190 140,140 C120,160 90,170 50,180" stroke-width="2.5" />
    <path d="M110,150 C130,140 160,110 150,90 C140,110 130,120 110,150" stroke-width="2.5" />
    
    <!-- Base leaf curl -->
    <path d="M35,220 C60,240 100,230 110,200 C90,210 70,210 35,220" stroke-width="2.5" />
  </g>
  
  <text x="50%" y="350" text-anchor="middle" fill="url(#goldGrad)" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="4">MODERN THAI VECTOR ART FUSION</text>
</svg>
