<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a0a" />
      <stop offset="100%" stop-color="#0e1717" />
    </linearGradient>
    <linearGradient id="hzGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="400" cy="200" r="240" fill="url(#cyanGlow)" filter="url(#blur)" />
  
  <!-- Overlapping refresh waves (showing multi-frame fluidity) -->
  <g opacity="0.8">
    <path d="M100,200 Q250,100 400,200 T700,200" fill="none" stroke="url(#hzGrad)" stroke-width="4.5" stroke-linecap="round" />
    <path d="M120,200 Q260,110 400,200 T680,200" fill="none" stroke="url(#hzGrad)" stroke-width="3" stroke-linecap="round" opacity="0.7" />
    <path d="M140,200 Q270,120 400,200 T660,200" fill="none" stroke="url(#hzGrad)" stroke-width="2" stroke-linecap="round" opacity="0.4" />
    <path d="M160,200 Q280,130 400,200 T640,200" fill="none" stroke="url(#hzGrad)" stroke-width="1" stroke-linecap="round" opacity="0.2" />
  </g>
  
  <!-- Display stats -->
  <g font-family="sans-serif" font-weight="bold" text-anchor="middle" opacity="0.8">
    <text x="400" y="140" fill="#14b8a6" font-size="28" letter-spacing="2">120Hz</text>
    <text x="400" y="165" fill="#ffffff" font-size="10" letter-spacing="4">FLUID RENDERING ENGINE</text>
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(20,184,166,0.4)" font-family="sans-serif" font-size="11" letter-spacing="3">REFRESH RATE PERFORMANCE INDEX</text>
</svg>
