<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b12" />
      <stop offset="100%" stop-color="#141624" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="12" stdDeviation="8" flood-color="#000" flood-opacity="0.4" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <!-- Outer security grid -->
  <g stroke="rgba(59,130,246,0.15)" stroke-width="1.5" fill="none">
    <circle cx="400" cy="190" r="130" />
    <circle cx="400" cy="190" r="160" stroke-dasharray="10 5" />
  </g>
  
  <!-- Security Shield & Lock mockup -->
  <g transform="translate(350, 110)" filter="url(#shadow)">
    <!-- Shield -->
    <path d="M50,0 C80,10 100,20 100,50 C100,100 50,140 50,140 C50,140 0,100 0,50 C0,20 20,10 50,0 Z" fill="url(#shieldGrad)" />
    <!-- Lock body -->
    <rect x="35" y="60" width="30" height="25" rx="4" fill="#ffffff" />
    <!-- Lock shackle -->
    <path d="M41,60 L41,48 C41,42 45,38 50,38 C55,38 59,42 59,48 L59,60" fill="none" stroke="#ffffff" stroke-width="3" />
    <!-- Lock keyhole dot -->
    <circle cx="50" cy="72" r="3" fill="#1d4ed8" />
  </g>
  
  <text x="50%" y="350" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="4">SECURE APPLICATION ARCHITECTURE</text>
</svg>
