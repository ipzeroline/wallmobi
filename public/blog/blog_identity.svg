<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0518" />
      <stop offset="50%" stop-color="#140830" />
      <stop offset="100%" stop-color="#05020c" />
    </linearGradient>
    <linearGradient id="identityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <radialGradient id="pinkGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ec4899" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  
  <circle cx="400" cy="200" r="220" fill="url(#pinkGlow)" filter="url(#blur)" />
  
  <!-- Stylized geometric profile/avatar representation -->
  <g stroke="url(#identityGrad)" stroke-width="2" fill="none">
    <!-- Concentric head profile shapes -->
    <path d="M340,240 C340,160 460,160 460,240" stroke-width="4" stroke-linecap="round" />
    <circle cx="400" cy="150" r="45" stroke-width="3" />
    
    <!-- Abstract aura waves -->
    <circle cx="400" cy="150" r="75" stroke-dasharray="6 6" opacity="0.6" />
    <circle cx="400" cy="150" r="105" stroke-dasharray="10 5" opacity="0.4" />
    <circle cx="400" cy="150" r="135" stroke-width="1.5" opacity="0.2" />
  </g>
  
  <!-- Sparkles -->
  <g fill="#f43f5e" opacity="0.8">
    <path d="M220,120 L225,100 L230,120 L250,125 L230,130 L225,150 L220,130 L200,125 Z" />
    <path d="M570,230 L573,215 L576,230 L590,233 L576,236 L573,250 L570,236 L556,233 Z" transform="scale(0.8) translate(120, 30)" />
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="11" letter-spacing="4">IDENTITY &amp; CHARACTER EXPRESSION</text>
</svg>
