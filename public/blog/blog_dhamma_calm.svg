<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05080c" />
      <stop offset="50%" stop-color="#0f1622" />
      <stop offset="100%" stop-color="#040609" />
    </linearGradient>
    <linearGradient id="lotusGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>
    <radialGradient id="peaceGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="400" cy="200" r="200" fill="url(#peaceGlow)" filter="url(#blur)" />
  
  <!-- Calming circular ripple waves -->
  <g stroke="rgba(56,189,248,0.15)" stroke-width="1" fill="none">
    <circle cx="400" cy="220" r="140" />
    <circle cx="400" cy="220" r="180" />
    <circle cx="400" cy="220" r="220" />
  </g>
  
  <!-- Lotus Flower outline -->
  <g transform="translate(350, 120)" stroke="url(#lotusGrad)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Center petal -->
    <path d="M50,100 C30,70 30,30 50,0 C70,30 70,70 50,100 Z" />
    <!-- Left petal -->
    <path d="M50,100 C10,90 -10,60 10,30 C25,55 40,75 50,100 Z" />
    <!-- Right petal -->
    <path d="M50,100 C90,90 110,60 90,30 C75,55 60,75 50,100 Z" />
    <!-- Bottom leaf base ripples -->
    <path d="M15,100 Q50,110 85,100" />
    <path d="M25,108 Q50,116 75,108" />
  </g>
  
  <text x="50%" y="360" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="sans-serif" font-size="11" letter-spacing="4">MINDFULNESS &amp; SILENT CALM</text>
</svg>
