<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="minGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="maxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="400" fill="#0b0f17" />
  
  <!-- Left Side: Minimalism -->
  <rect x="40" y="40" width="340" height="320" rx="16" fill="url(#minGrad)" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  <circle cx="210" cy="200" r="50" fill="none" stroke="#38bdf8" stroke-width="4" />
  <line x1="210" y1="90" x2="210" y2="310" stroke="rgba(56,189,248,0.15)" stroke-width="1.5" stroke-dasharray="10 5" />
  <text x="210" y="290" text-anchor="middle" fill="#38bdf8" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="4">MINIMALISM</text>

  <!-- Right Side: Maximalism -->
  <rect x="420" y="40" width="340" height="320" rx="16" fill="#180e29" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  <!-- Overlapping vibrant patterns -->
  <g opacity="0.85">
    <path d="M440,240 C500,100 550,320 600,120 S700,280 740,160" fill="none" stroke="url(#maxGrad)" stroke-width="8" stroke-linecap="round" />
    <path d="M440,160 C500,280 550,80 600,280 S700,120 740,240" fill="none" stroke="url(#maxGrad)" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    <circle cx="500" cy="120" r="25" fill="#f43f5e" opacity="0.5" />
    <circle cx="680" cy="280" r="35" fill="#06b6d4" opacity="0.4" />
    <polygon points="620,160 640,200 600,200" fill="#eab308" opacity="0.7" />
  </g>
  <text x="590" y="290" text-anchor="middle" fill="#ec4899" font-family="sans-serif" font-size="12" font-weight="600" letter-spacing="4">MAXIMALISM</text>
  
  <text x="50%" y="380" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-family="sans-serif" font-size="10" letter-spacing="3">STYLE BATTLE: MINIMAL vs MAXIMAL</text>
</svg>
