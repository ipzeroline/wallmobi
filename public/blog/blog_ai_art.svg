<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f" />
      <stop offset="50%" stop-color="#120e24" />
      <stop offset="100%" stop-color="#050508" />
    </linearGradient>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7b4bd6" />
      <stop offset="100%" stop-color="#00f3ff" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7b4bd6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#7b4bd6" stop-opacity="0" />
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>
  <rect width="800" height="400" fill="url(#bgGrad)" />
  <circle cx="400" cy="200" r="300" fill="url(#glow)" filter="url(#blur)" />
  <circle cx="200" cy="100" r="150" fill="#ff007f" fill-opacity="0.15" filter="url(#blur)" />
  <circle cx="600" cy="300" r="150" fill="#00f3ff" fill-opacity="0.15" filter="url(#blur)" />
  <path d="M-100,250 Q100,50 300,250 T700,250 T900,150" fill="none" stroke="url(#cyberGrad)" stroke-width="4" opacity="0.8" />
  <path d="M-100,200 Q150,300 400,100 T800,200 T900,300" fill="none" stroke="url(#cyberGrad)" stroke-width="2" opacity="0.5" />
  <path d="M-100,300 Q50,100 350,300 T750,100 T900,200" fill="none" stroke="url(#cyberGrad)" stroke-width="1.5" opacity="0.3" stroke-dasharray="10 5" />
  <g stroke="rgba(255,255,255,0.15)" stroke-width="1">
    <line x1="400" y1="120" x2="350" y2="200" />
    <line x1="400" y1="120" x2="450" y2="200" />
    <line x1="350" y1="200" x2="400" y2="280" />
    <line x1="450" y1="200" x2="400" y2="280" />
    <line x1="350" y1="200" x2="450" y2="200" />
    <line x1="400" y1="120" x2="400" y2="280" />
    <line x1="280" y1="200" x2="350" y2="200" />
    <line x1="520" y1="200" x2="450" y2="200" />
  </g>
  <circle cx="400" cy="120" r="6" fill="#00f3ff" />
  <circle cx="350" cy="200" r="5" fill="#ff007f" />
  <circle cx="450" cy="200" r="5" fill="#7b4bd6" />
  <circle cx="400" cy="280" r="6" fill="#00f3ff" />
  <circle cx="280" cy="200" r="3" fill="#fff" opacity="0.7" />
  <circle cx="520" cy="200" r="3" fill="#fff" opacity="0.7" />
  <text x="50%" y="350" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="12" letter-spacing="4">CREATIVE AI ENGINE</text>
</svg>
